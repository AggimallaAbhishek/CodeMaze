name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Lint Python
        run: |
          flake8 apps/api workers/engine

      - name: Format check (black)
        run: |
          black --check apps/api workers/engine

      - name: Security scan (Bandit)
        run: |
          bandit -r apps/api workers/engine

      - name: Run backend tests
        env:
          DJANGO_SETTINGS_MODULE: puzzle_api.settings
          PYTHONPATH: ${{ github.workspace }}/apps/api:${{ github.workspace }}/workers/engine
          SECRET_KEY: test-secret
          DEBUG: true
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd apps/api
          pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Lint frontend
        run: |
          cd apps/web
          npm run lint

      - name: Run frontend unit tests
        run: |
          cd apps/web
          npm run test -- --run

      - name: Security audit
        run: |
          cd apps/web
          npm audit --audit-level=high
